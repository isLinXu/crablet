<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crablet</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Animated gradient orbs ── */
    .orb-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #6366f1, #4f46e5);
      top: -10%; left: -5%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #8b5cf6, #7c3aed);
      bottom: -15%; right: -5%;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #06b6d4, #0891b2);
      top: 40%; left: 50%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ── Splash card ── */
    .splash-card {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.1); }
      50% { box-shadow: 0 0 60px rgba(99, 102, 241, 0.2); }
    }

    /* ── Logo ── */
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      animation: logo-pulse 2s ease-in-out infinite;
    }

    @keyframes logo-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f1f5f9, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ── Loading indicator ── */
    .loader {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: loader-bounce 1.4s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.16s; }
    .loader-dot:nth-child(3) { animation-delay: 0.32s; }

    @keyframes loader-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .status-text {
      color: var(--text-secondary);
      font-size: 13px;
      min-height: 20px;
    }

    /* ── Config form (hidden by default) ── */
    .config-form {
      display: none;
      text-align: left;
      margin-top: 24px;
    }

    .config-form.active { display: block; }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    /* ── Success animation ── */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .success-overlay.active { display: flex; }

    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      animation: success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes success-pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .success-text {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Animated gradient orbs -->
  <div class="orb-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Splash card -->
  <div class="splash-card" id="splashCard">
    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="55" rx="38" ry="30" fill="#6366f1" opacity="0.9"/>
        <circle cx="35" cy="48" r="6" fill="white"/>
        <circle cx="65" cy="48" r="6" fill="white"/>
        <circle cx="35" cy="48" r="3" fill="#0a0a0f"/>
        <circle cx="65" cy="48" r="3" fill="#0a0a0f"/>
        <path d="M42 62 Q50 68 58 62" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M20 35 L12 18" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
        <path d="M80 35 L88 18" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="4" fill="#818cf8"/>
        <circle cx="88" cy="16" r="4" fill="#818cf8"/>
      </svg>
    </div>

    <h1>Crablet</h1>
    <p class="subtitle">AI Agent Platform — v0.1.0</p>

    <!-- Loading indicator -->
    <div class="loader" id="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <p class="status-text" id="statusText">Initializing sidecar...</p>

    <!-- Config form (shown on first launch) -->
    <div class="config-form" id="configForm">
      <div class="form-group">
        <label>API Endpoint</label>
        <input type="url" id="apiEndpoint" placeholder="http://localhost:8080" value="http://localhost:8080" />
      </div>
      <div class="form-group">
        <label>Model Route</label>
        <select id="modelRoute">
          <option value="auto">Auto (Recommended)</option>
          <option value="cloud">Cloud</option>
          <option value="local">Local</option>
        </select>
      </div>
      <div class="form-group">
        <label>API Key (Optional)</label>
        <input type="password" id="apiKey" placeholder="sk-..." />
      </div>
      <button class="btn-primary" id="connectBtn">
        <i class="fas fa-plug"></i>&nbsp; Connect
      </button>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">
      <i class="fas fa-check"></i>
    </div>
    <p class="success-text">Connected!</p>
  </div>

  <script>
    // ── Splash logic ──
    const statusText = document.getElementById('statusText');
    const loader = document.getElementById('loader');
    const configForm = document.getElementById('configForm');
    const connectBtn = document.getElementById('connectBtn');
    const successOverlay = document.getElementById('successOverlay');

    const STEPS = [
      'Initializing sidecar...',
      'Starting local server...',
      'Checking port availability...',
      'Loading model registry...',
      'Ready!',
    ];

    let step = 0;
    const interval = setInterval(() => {
      step++;
      if (step < STEPS.length) {
        statusText.textContent = STEPS[step];
      }
      if (step === STEPS.length - 1) {
        clearInterval(interval);
        // Show config form after loading
        setTimeout(() => {
          loader.style.display = 'none';
          configForm.classList.add('active');
        }, 600);
      }
    }, 1200);

    // ── Connect button ──
    connectBtn.addEventListener('click', () => {
      const endpoint = document.getElementById('apiEndpoint').value;
      const route = document.getElementById('modelRoute').value;
      const apiKey = document.getElementById('apiKey').value;

      // Save config
      localStorage.setItem('crablet_api_endpoint', endpoint);
      localStorage.setItem('crablet_model_route', route);
      if (apiKey) localStorage.setItem('crablet_api_key', apiKey);

      // Show success animation
      successOverlay.classList.add('active');
      setTimeout(() => {
        // Navigate to main chat
        window.location.href = '/chat.html';
      }, 1500);
    });
  </script>
</body>
</html>
