<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6e40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9e80;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Crab shell -->
  <ellipse cx="256" cy="280" rx="180" ry="140" fill="url(#grad)" />
  <!-- Eyes -->
  <circle cx="200" cy="250" r="24" fill="#fff" />
  <circle cx="312" cy="250" r="24" fill="#fff" />
  <circle cx="205" cy="248" r="12" fill="#333" />
  <circle cx="317" cy="248" r="12" fill="#333" />
  <!-- Claws -->
  <ellipse cx="100" cy="340" rx="50" ry="30" fill="#ff6e40" transform="rotate(-20 100 340)" />
  <ellipse cx="412" cy="340" rx="50" ry="30" fill="#ff6e40" transform="rotate(20 412 340)" />
  <!-- Legs -->
  <line x1="140" y1="380" x2="100" y2="430" stroke="#ff6e40" stroke-width="12" stroke-linecap="round"/>
  <line x1="180" y1="400" x2="150" y2="450" stroke="#ff6e40" stroke-width="12" stroke-linecap="round"/>
  <line x1="332" y1="400" x2="362" y2="450" stroke="#ff6e40" stroke-width="12" stroke-linecap="round"/>
  <line x1="372" y1="380" x2="412" y2="430" stroke="#ff6e40" stroke-width="12" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M 210 310 Q 256 340 302 310" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
