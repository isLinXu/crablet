name: Build Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.1.0)"
        required: false
      platforms:
        description: "Platforms (comma-sep: macos,linux,windows)"
        required: false
        default: "macos,windows"

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CRABLET_RUN_REAL_LLM_TESTS: 0

jobs:
  # ─── macOS (arm64 + x64) ───
  build-macos:
    if: contains(github.event.inputs.platforms, 'macos') || github.event_name == 'push'
    strategy:
      matrix:
        include:
          - runner: macos-latest       # Apple Silicon
            target: aarch64-apple-darwin
            dmg_arch: aarch64
          - runner: macos-13           # Intel
            target: x86_64-apple-darwin
            dmg_arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target
            ./desktop -> target

      - name: Install tauri-cli
        run: |
          if ! command -v cargo-tauri &>/dev/null; then
            cargo install tauri-cli --version "^2"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync frontend to desktop/ui
        run: |
          rm -rf desktop/ui
          cp -R frontend/dist desktop/ui

      - name: Build sidecar (release)
        run: cargo build --release -p crablet --no-default-features --features web

      - name: Copy sidecar binary
        run: |
          mkdir -p desktop/binaries
          cp target/release/crablet desktop/binaries/crablet-${{ matrix.target }}
          chmod +x desktop/binaries/crablet-${{ matrix.target }}

      - name: Build Tauri app
        run: cd desktop && cargo tauri build --bundles app

      - name: Fix sidecar paths
        run: |
          APP_PATH="target/release/bundle/macos/Crablet.app"
          SIDECAR="crablet-${{ matrix.target }}"
          for dir in \
            "${APP_PATH}/Contents/MacOS/binaries" \
            "${APP_PATH}/Contents/Resources/binaries" \
            "${APP_PATH}/Contents/MacOS"; do
            if [ -d "${dir}" ] && [ ! -f "${dir}/${SIDECAR}" ]; then
              if [ -f "${dir}/crablet" ] && "${dir}/crablet" --help 2>/dev/null | grep -q "serve-web"; then
                ln -f "${dir}/crablet" "${dir}/${SIDECAR}" 2>/dev/null || cp "${dir}/crablet" "${dir}/${SIDECAR}"
              fi
            fi
          done
          # 兜底：从 binaries/ 直接复制
          mkdir -p "${APP_PATH}/Contents/MacOS/binaries"
          cp -f "desktop/binaries/${SIDECAR}" "${APP_PATH}/Contents/MacOS/binaries/${SIDECAR}"

      - name: Code sign
        run: |
          codesign --force --deep --sign - target/release/bundle/macos/Crablet.app

      - name: Create DMG
        run: |
          APP_PATH="target/release/bundle/macos/Crablet.app"
          DMG_DIR="target/release/bundle/dmg"
          STAGING=$(mktemp -d)
          mkdir -p "${DMG_DIR}"
          cp -R "${APP_PATH}" "${STAGING}/"
          ln -sf /Applications "${STAGING}/Applications"
          VERSION="${{ github.event.inputs.version || '0.1.0' }}"
          hdiutil create \
            -volname "Crablet" \
            -srcfolder "${STAGING}" \
            -ov \
            -format UDZO \
            "${DMG_DIR}/Crablet_${VERSION}_${{ matrix.dmg_arch }}.dmg"
          rm -rf "${STAGING}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-macOS-${{ matrix.dmg_arch }}
          path: target/release/bundle/dmg/*.dmg

  # ─── Linux (x64) ───
  build-linux:
    if: contains(github.event.inputs.platforms, 'linux') || github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target
            ./desktop -> target

      - name: Install tauri-cli
        run: |
          if ! command -v cargo-tauri &>/dev/null; then
            cargo install tauri-cli --version "^2"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync frontend to desktop/ui
        run: |
          rm -rf desktop/ui
          cp -R frontend/dist desktop/ui

      - name: Build sidecar
        run: cargo build --release -p crablet --no-default-features --features web

      - name: Copy sidecar binary
        run: |
          mkdir -p desktop/binaries
          cp target/release/crablet desktop/binaries/crablet-x86_64-unknown-linux-gnu
          chmod +x desktop/binaries/crablet-x86_64-unknown-linux-gnu

      - name: Build Tauri (AppImage + DEB)
        run: cd desktop && cargo tauri build --bundles "deb,appimage"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-Linux-x64
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  # ─── Windows (x64) ───
  build-windows:
    if: contains(github.event.inputs.platforms, 'windows') || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target
            ./desktop -> target

      - name: Install tauri-cli
        run: |
          if (-not (Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync frontend to desktop/ui
        shell: pwsh
        run: |
          if (Test-Path desktop/ui) { Remove-Item -Recurse -Force desktop/ui }
          Copy-Item -Recurse frontend/dist desktop/ui

      - name: Build sidecar
        run: cargo build --release -p crablet --no-default-features --features web
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Copy sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop\binaries
          Copy-Item target\release\crablet.exe desktop\binaries\crablet-x86_64-pc-windows-msvc.exe

      - name: Build Tauri (NSIS)
        run: cd desktop && cargo tauri build --bundles nsis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-Windows-x64
          path: target/release/bundle/nsis/*.exe

  # ─── Release ───
  release:
    needs: [build-macos, build-linux, build-windows]
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Crablet-macOS-*/*.dmg
            Crablet-Linux-*/*.deb
            Crablet-Linux-*/*.AppImage
            Crablet-Windows-*/*.exe
          draft: true
          generate_release_notes: true
