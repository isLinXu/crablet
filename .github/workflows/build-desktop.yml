name: Build Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.1.0)"
        required: false
      platforms:
        description: "Platforms (comma-sep: macos,linux,windows)"
        required: false
        default: "macos,windows"

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CRABLET_RUN_REAL_LLM_TESTS: 0
  # 统一由 scripts/pack.sh 完成前端→sidecar→Tauri→签名→DMG/EXE/AppImage 全流程，
  # 避免 CI 与本地打包逻辑重复维护（详见 scripts/pack.sh）。
  CRABLET_VERSION: ${{ github.event.inputs.version || (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || '' }}

jobs:
  # ─── macOS (arm64 + x64) ───
  build-macos:
    if: contains(github.event.inputs.platforms, 'macos') || github.event_name == 'push'
    strategy:
      matrix:
        include:
          - runner: macos-14           # Apple Silicon
            target: aarch64-apple-darwin
            asset_arch: arm64
          - runner: macos-13           # Intel
            target: x86_64-apple-darwin
            asset_arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-${{ matrix.target }}
          workspaces: |
            ./crablet -> target
            ./desktop -> target

      - name: Install tauri-cli
        run: |
          if ! command -v cargo-tauri &>/dev/null; then
            cargo install tauri-cli --version "^2"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: "Run unified pack script (--ci: frontend -> sidecar -> tauri -> sign -> dmg)"
        env:
          CRABLET_MACOS_TARGET: ${{ matrix.target }}
        run: bash scripts/pack.sh --ci

      - name: Verify architecture-labelled DMG exists
        run: test -f "target/${{ matrix.target }}/release/bundle/dmg/Crablet-${CRABLET_VERSION#v}-macos-${{ matrix.asset_arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-macOS-${{ matrix.asset_arch }}
          path: target/${{ matrix.target }}/release/bundle/dmg/Crablet-*-macos-${{ matrix.asset_arch }}.dmg
          if-no-files-found: error

  # ─── Linux (x64) ───
  build-linux:
    if: contains(github.event.inputs.platforms, 'linux') || github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target
            ./desktop -> target

      - name: Install tauri-cli
        run: |
          if ! command -v cargo-tauri &>/dev/null; then
            cargo install tauri-cli --version "^2"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: "Run unified pack script (--ci mode: frontend → sidecar → tauri → deb/appimage)"
        run: bash scripts/pack.sh --ci

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-Linux-x64
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  # ─── Windows (x64) ───
  build-windows:
    if: contains(github.event.inputs.platforms, 'windows') || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target
            ./desktop -> target

      - name: Install tauri-cli
        run: |
          if (-not (Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Windows runner 自带 Git Bash，可直接复用统一打包脚本（避免与 macOS/Linux 逻辑分叉）
      - name: "Run unified pack script (--ci mode: frontend → sidecar (crt-static) → tauri NSIS)"
        shell: bash
        run: bash scripts/pack.sh --ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-Windows-x64
          path: target/release/bundle/nsis/*.exe

  # ─── Release ───
  release:
    needs: [build-macos, build-linux, build-windows]
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Crablet-macOS-*/*.dmg
            Crablet-Linux-*/*.deb
            Crablet-Linux-*/*.AppImage
            Crablet-Windows-*/*.exe
          draft: true
          generate_release_notes: true
