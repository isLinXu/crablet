name: Build Desktop App

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.1.0)"
        required: false

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CRABLET_RUN_REAL_LLM_TESTS: 0

jobs:
  # ─── macOS (arm64) ───
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: Cache tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-${{ runner.os }}-v2

      - name: Install tauri-cli
        run: |
          if [ ! -f ~/.cargo/bin/cargo-tauri ]; then
            cargo install tauri-cli --version "^2"
          fi

      - name: Build crablet sidecar (release)
        run: cargo build --release -p crablet --no-default-features --features web

      - name: Copy sidecar binary
        run: |
          mkdir -p desktop/binaries
          cp target/release/crablet desktop/binaries/crablet-aarch64-apple-darwin
          chmod +x desktop/binaries/crablet-aarch64-apple-darwin

      - name: Build Tauri app
        run: |
          cd desktop
          cargo tauri build --bundles app

      - name: Fix sidecar paths in .app bundle
        run: |
          APP_PATH="target/release/bundle/macos/Crablet.app"
          SIDECAR_TARGET="crablet-aarch64-apple-darwin"

          for dir in \
            "${APP_PATH}/Contents/MacOS/binaries" \
            "${APP_PATH}/Contents/Resources/binaries" \
            "${APP_PATH}/Contents/MacOS"; do
            if [ -d "${dir}" ]; then
              if [ ! -f "${dir}/${SIDECAR_TARGET}" ] && [ -f "${dir}/crablet" ]; then
                FILE_SIZE=$(stat -f%z "${dir}/crablet" 2>/dev/null || echo 0)
                if [ "${FILE_SIZE}" -gt 1000000 ]; then
                  echo "Creating hard-link: ${dir}/${SIDECAR_TARGET} -> crablet"
                  ln -f "${dir}/crablet" "${dir}/${SIDECAR_TARGET}" 2>/dev/null || {
                    echo "WARN: hard-link failed, falling back to copy"
                    cp "${dir}/crablet" "${dir}/${SIDECAR_TARGET}"
                  }
                fi
              fi
            fi
          done

      - name: Code sign (Ad-hoc)
        run: |
          codesign --force --deep --sign - target/release/bundle/macos/Crablet.app
        # 如有 Developer ID 证书，取消注释以下行并配置 secrets：
        # env:
        #   CODE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}

      - name: Create DMG
        run: |
          APP_PATH="target/release/bundle/macos/Crablet.app"
          DMG_DIR="target/release/bundle/dmg"
          STAGING="${{ runner.temp }}/crablet-dmg-staging"
          mkdir -p "${STAGING}" "${DMG_DIR}"
          cp -R "${APP_PATH}" "${STAGING}/"
          ln -sf /Applications "${STAGING}/Applications"
          hdiutil create \
            -volname "Crablet" \
            -srcfolder "${STAGING}" \
            -ov \
            -format UDZO \
            "${DMG_DIR}/Crablet_${{ github.event.inputs.version || '0.1.0' }}_aarch64.dmg"
          rm -rf "${STAGING}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-macOS-arm64
          path: target/release/bundle/dmg/*.dmg

  # ─── Windows (x64) ───
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: Cache tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-${{ runner.os }}-v2

      - name: Install tauri-cli
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.cargo\bin\cargo-tauri.exe")) {
            cargo install tauri-cli --version "^2"
          }

      - name: Build crablet sidecar (release)
        run: cargo build --release -p crablet --no-default-features --features web
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Copy sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop\binaries
          Copy-Item target\release\crablet.exe desktop\binaries\crablet-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (NSIS installer)
        run: |
          cd desktop
          cargo tauri build --bundles nsis

      - name: Fix sidecar paths in Windows bundle
        shell: pwsh
        run: |
          $SIDECAR_TARGET = "crablet-x86_64-pc-windows-msvc.exe"
          $NSIS_DIR = "target\release\bundle\nsis"
          if (Test-Path $NSIS_DIR) {
            Get-ChildItem $NSIS_DIR -Recurse -Filter "crablet.exe" | ForEach-Object {
              $targetPath = Join-Path $_.DirectoryName $SIDECAR_TARGET
              if (-not (Test-Path $targetPath)) {
                Copy-Item $_.FullName $targetPath
              }
            }
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Crablet-Windows-x64
          path: target/release/bundle/nsis/*.exe

  # ─── Release ───
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Crablet-macOS-arm64/*.dmg
            Crablet-Windows-x64/*.exe
          draft: true
          generate_release_notes: true
