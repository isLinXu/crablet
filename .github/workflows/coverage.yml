name: Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - "crablet/**"
      - "frontend/**"
      - ".github/workflows/coverage.yml"
      - "scripts/check_lcov_threshold.sh"
      - "Justfile"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
    paths:
      - "crablet/**"
      - "frontend/**"
      - ".github/workflows/coverage.yml"
      - "scripts/check_lcov_threshold.sh"
      - "Justfile"
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  OPENAI_API_KEY: sk-test
  CRABLET_RUN_REAL_LLM_TESTS: 0
  COVERAGE_THRESHOLD: "80"

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: ./crablet
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: Generate LCOV report
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --no-default-features --features web --lcov --output-path coverage/lcov.info

      - name: Enforce coverage gate
        run: bash ../scripts/check_lcov_threshold.sh coverage/lcov.info "${COVERAGE_THRESHOLD}" backend-web

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-web-lcov
          path: ./crablet/coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./crablet/coverage/lcov.info
          flags: backend-web
          name: crablet-backend-coverage
          fail_ci_if_error: false

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./crablet/coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          delete-old-comments: true

  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate frontend coverage
        run: npm run test:coverage

      - name: Upload frontend LCOV artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-lcov
          path: ./frontend/coverage/lcov.info

      - name: Upload frontend HTML coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-html
          path: ./frontend/coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: crablet-frontend-coverage
          fail_ci_if_error: false
