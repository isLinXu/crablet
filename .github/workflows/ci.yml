name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  OPENAI_API_KEY: sk-test
  CRABLET_RUN_REAL_LLM_TESTS: 0
  CI: true
  CARGO_INCREMENTAL: 0

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./crablet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets --no-default-features --features web -- -D warnings

      - name: Check documentation build
        run: cargo doc --locked --no-deps --document-private-items --no-default-features --features web
        env:
          RUSTDOCFLAGS: -D warnings

  backend-tests:
    name: Backend ${{ matrix.suite.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: Web Test Suite
            command: cargo test --locked --no-default-features --features web
          - name: Doc Tests
            command: cargo test --locked --doc --no-default-features --features web
          - name: All Features Compile
            command: cargo check --locked --all-features
    defaults:
      run:
        working-directory: ./crablet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: Run ${{ matrix.suite.name }}
        run: ${{ matrix.suite.command }}

  backend-msrv:
    name: Backend MSRV (Rust 1.80)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ./crablet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-action@stable
        with:
          toolchain: 1.80.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: MSRV compile check (web)
        run: cargo check --locked --no-default-features --features web

  backend-build:
    name: Backend Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: ./crablet
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./crablet -> target

      - name: Build Web profile
        run: cargo build --locked --release --no-default-features --features web

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci
