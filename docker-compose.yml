version: '3.8'

services:
  crablet:
    build: .
    image: crablet:latest
    container_name: crablet
    restart: unless-stopped
    ports:
      - "3000:3000"   # Web UI
      - "18789:18789" # Gateway RPC
    environment:
      - RUST_LOG=info
      # Connection to Neo4j
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=crablet_secret_password
      # Models (Provide via .env or override here)
      - OPENAI_MODEL_NAME=gpt-4o-mini
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
    volumes:
      # Persistent Data
      - crablet_data:/app/data:rw
      - crablet_config:/app/config:rw
      # Skills Directory (Mount local skills for dev, or persistent volume)
      - ./skills:/app/skills:rw
      # Docker Socket for Sandbox (CRITICAL)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - neo4j
    # Network mode: bridge is default, fine for container-to-container
    # To access host services (like Ollama on host), use host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  neo4j:
    image: neo4j:5-community
    container_name: crablet-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/crablet_secret_password
      - NEO4J_PLUGINS=["apoc"]
      # Performance tuning for small instances
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  crablet_data:
  crablet_config:
  neo4j_data:
  neo4j_logs:
