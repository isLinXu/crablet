services:
  # Reverse Proxy (TLS + Rate Limiting)
  traefik:
    image: traefik:v3.1
    ports: ["443:443", "80:80"]
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    command: --providers.docker
    networks:
      - proxy

  # Docker Socket Proxy (Security Isolation)
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    environment:
      CONTAINERS: 1
      POST: 1
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - internal

  crablet:
    build: .
    image: crablet:latest
    container_name: crablet
    restart: unless-stopped
    ports:
      - "3000:3000"   # Web UI
    environment:
      - RUST_LOG=info
      # Connection to Neo4j
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      # Models
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME}
      # Knowledge
      - QDRANT_URL=http://qdrant:6334
      # Docker via Proxy
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - crablet_data:/app/data:rw
      - crablet_config:/app/config:rw
      - ./crablet/skills:/app/skills:rw
    depends_on:
      - neo4j
      - docker-proxy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    networks:
      - internal
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  crablet-gateway:
    image: crablet:latest
    container_name: crablet-gateway
    restart: unless-stopped
    command: ["crablet", "gateway", "--port", "18789"]
    ports:
      - "18789:18789"   # API Gateway
    environment:
      - RUST_LOG=info
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME}
      - QDRANT_URL=http://qdrant:6334
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - crablet_data:/app/data:rw
      - crablet_config:/app/config:rw
      - ./crablet/skills:/app/skills:rw
    depends_on:
      - neo4j
      - qdrant
      - docker-proxy
    networks:
      - internal
      - proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  neo4j:
    image: neo4j:5.23.0-community
    container_name: crablet-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - internal

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes: [qdrant_data:/qdrant/storage]
    networks: [internal]

  # OTLP Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    networks: [internal]

volumes:
  crablet_data:
  crablet_config:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  internal:
    internal: true
  proxy:
